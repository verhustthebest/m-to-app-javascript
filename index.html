    <!DOCTYPE html>
    <html>
    <head>

    <title>météo App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">

    </head>
    <body>

    <h1>Méologie App. Altas B.C</h1>

    <input id="ville" placeholder="Ecrivez votre ville" autofocus>

    <button id="recherch">Recherche</button>

    <div id="meteo">
        <h2 id="villeName"></h2>

        <img id="Icon" alt="meteo icon">

        <p id="temperature"></p>
        <p id="longitude"></p>
        <p id="latitude"></p>
        <p id="humidity"></p>
        <p id="wind"></p>
        <p id="loader" style="display:none;">Chargement...</p>
    </div>

    <script src="scriptMto.js"></script>
    </body>
    </html>
